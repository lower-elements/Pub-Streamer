name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build native components
        run: ./build_native.ps1

      - name: Build with Nuitka
        run: uv run python build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PubStreamer-windows
          path: dist/main.dist/
          if-no-files-found: error

      # Create a GitHub Release and attach the build when a version tag is pushed.
      - name: Zip release folder
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist/main.dist/* -DestinationPath dist/PubStreamer-${{ github.ref_name }}-windows.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PubStreamer-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
